name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  PYTHON_VERSION: "3.12"
  JAVA_VERSION: "25"
  PYTEST_CACHE_VERSION: "v1"
  RUST_TOOLCHAIN: "stable"

jobs:
  build-wheel:
    name: Build Python wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-python: true
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
      - name: Build wheel
        run: uv build --wheel
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: ci-python-wheel
          path: dist/*.whl
          if-no-files-found: error

  quality:
    name: Style, types, and docs
    needs: build-wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-python: true
      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: ci-python-wheel
          path: dist
      - name: Sync dependencies
        run: uv sync --extra dev --no-install-project
      - name: Extract built extension
        run: |
          .venv/bin/python - <<'PY'
          import zipfile
          from pathlib import Path

          wheel = next(Path("dist").glob("*.whl"))
          with zipfile.ZipFile(wheel) as archive:
              members = [
                  name
                  for name in archive.namelist()
                  if name.startswith("pytecode/_rust.")
                  and not name.endswith("/")
                  and Path(name).suffix in {".so", ".pyd", ".dylib"}
              ]
              if len(members) != 1:
                  raise SystemExit(f"Expected exactly one pytecode._rust binary in {wheel}, found: {members}")
              target = Path("pytecode") / Path(members[0]).name
              target.write_bytes(archive.read(members[0]))
          PY
      - name: Lint
        run: .venv/bin/ruff check .
      - name: Check formatting
        run: .venv/bin/ruff format --check .
      - name: Type-check
        run: .venv/bin/basedpyright
      - name: Generate API docs
        run: .venv/bin/python tools/generate_api_docs.py
      - name: Upload API docs artifact
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        uses: actions/upload-artifact@v7
        with:
          name: github-pages-docs
          path: docs/api
          if-no-files-found: error

  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run tests
        run: cargo test --workspace

  test:
    name: Pytest (non-oracle)
    needs: build-wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-python: true
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: ci-python-wheel
          path: dist
      - name: Sync dependencies
        run: uv sync --extra dev --no-install-project
      - name: Extract built extension
        run: |
          .venv/bin/python - <<'PY'
          import zipfile
          from pathlib import Path

          wheel = next(Path("dist").glob("*.whl"))
          with zipfile.ZipFile(wheel) as archive:
              members = [
                  name
                  for name in archive.namelist()
                  if name.startswith("pytecode/_rust.")
                  and not name.endswith("/")
                  and Path(name).suffix in {".so", ".pyd", ".dylib"}
              ]
              if len(members) != 1:
                  raise SystemExit(f"Expected exactly one pytecode._rust binary in {wheel}, found: {members}")
              target = Path("pytecode") / Path(members[0]).name
              target.write_bytes(archive.read(members[0]))
          PY
      - name: Cache Pytest data
        uses: actions/cache@v5
        with:
          path: .pytest_cache
          key: pytest-cache-${{ env.PYTEST_CACHE_VERSION }}-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-jdk${{ env.JAVA_VERSION }}-${{ hashFiles('uv.lock', 'tests/helpers.py', 'tests/resources/**/*.java') }}-${{ github.job }}
          restore-keys: |
            pytest-cache-${{ env.PYTEST_CACHE_VERSION }}-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-jdk${{ env.JAVA_VERSION }}-${{ hashFiles('uv.lock', 'tests/helpers.py', 'tests/resources/**/*.java') }}-
            pytest-cache-${{ env.PYTEST_CACHE_VERSION }}-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-jdk${{ env.JAVA_VERSION }}-
      - name: Run pytest (excluding oracle)
        run: .venv/bin/pytest -q -m "not oracle"

  oracle:
    name: Pytest (oracle)
    needs: build-wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-python: true
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: ci-python-wheel
          path: dist
      - name: Sync dependencies
        run: uv sync --extra dev --no-install-project
      - name: Extract built extension
        run: |
          .venv/bin/python - <<'PY'
          import zipfile
          from pathlib import Path

          wheel = next(Path("dist").glob("*.whl"))
          with zipfile.ZipFile(wheel) as archive:
              members = [
                  name
                  for name in archive.namelist()
                  if name.startswith("pytecode/_rust.")
                  and not name.endswith("/")
                  and Path(name).suffix in {".so", ".pyd", ".dylib"}
              ]
              if len(members) != 1:
                  raise SystemExit(f"Expected exactly one pytecode._rust binary in {wheel}, found: {members}")
              target = Path("pytecode") / Path(members[0]).name
              target.write_bytes(archive.read(members[0]))
          PY
      - name: Cache Pytest data
        uses: actions/cache@v5
        with:
          path: .pytest_cache
          key: pytest-cache-${{ env.PYTEST_CACHE_VERSION }}-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-jdk${{ env.JAVA_VERSION }}-${{ hashFiles('uv.lock', 'tests/helpers.py', 'tests/resources/**/*.java') }}-${{ github.job }}
          restore-keys: |
            pytest-cache-${{ env.PYTEST_CACHE_VERSION }}-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-jdk${{ env.JAVA_VERSION }}-${{ hashFiles('uv.lock', 'tests/helpers.py', 'tests/resources/**/*.java') }}-
            pytest-cache-${{ env.PYTEST_CACHE_VERSION }}-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-jdk${{ env.JAVA_VERSION }}-
      - name: Run oracle suite
        run: |
          set +e
          .venv/bin/pytest -q -m oracle
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if [ "$status" -eq 5 ]; then
            echo "No oracle-marked tests collected; skipping oracle lane."
            exit 0
          fi
          exit "$status"

  pages-build:
    name: Build GitHub Pages artifact
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    needs: [quality, rust, test, oracle]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Download API docs artifact
        uses: actions/download-artifact@v8
        with:
          name: github-pages-docs
          path: docs/api
      - name: Disable Jekyll processing
        run: touch docs/api/.nojekyll
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/api

  deploy-pages:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    needs: pages-build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
