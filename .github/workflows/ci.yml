name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  PYTHON_VERSION: "3.14"
  JAVA_VERSION: "25"
  PYTEST_CACHE_VERSION: "v1"
  RUST_TOOLCHAIN: "stable"

jobs:
  quality:
    name: Style, types, and docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-python: true
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Type-check
        run: uv run basedpyright
      - name: Validate API docs coverage
        run: uv run python tools/generate_api_docs.py --check

  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run tests
        run: cargo test --workspace

  test:
    name: Pytest (non-oracle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-python: true
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Cache Pytest data
        uses: actions/cache@v5
        with:
          path: .pytest_cache
          key: pytest-cache-${{ env.PYTEST_CACHE_VERSION }}-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-jdk${{ env.JAVA_VERSION }}-${{ hashFiles('uv.lock', 'tests/helpers.py', 'tests/resources/**/*.java') }}-${{ github.job }}
          restore-keys: |
            pytest-cache-${{ env.PYTEST_CACHE_VERSION }}-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-jdk${{ env.JAVA_VERSION }}-${{ hashFiles('uv.lock', 'tests/helpers.py', 'tests/resources/**/*.java') }}-
            pytest-cache-${{ env.PYTEST_CACHE_VERSION }}-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-jdk${{ env.JAVA_VERSION }}-
      - name: Run pytest (excluding oracle)
        run: uv run pytest -q -m "not oracle"

  oracle:
    name: Pytest (oracle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-python: true
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Cache Pytest data
        uses: actions/cache@v5
        with:
          path: .pytest_cache
          key: pytest-cache-${{ env.PYTEST_CACHE_VERSION }}-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-jdk${{ env.JAVA_VERSION }}-${{ hashFiles('uv.lock', 'tests/helpers.py', 'tests/resources/**/*.java') }}-${{ github.job }}
          restore-keys: |
            pytest-cache-${{ env.PYTEST_CACHE_VERSION }}-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-jdk${{ env.JAVA_VERSION }}-${{ hashFiles('uv.lock', 'tests/helpers.py', 'tests/resources/**/*.java') }}-
            pytest-cache-${{ env.PYTEST_CACHE_VERSION }}-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-jdk${{ env.JAVA_VERSION }}-
      - name: Run oracle suite
        run: |
          set +e
          uv run pytest -q -m oracle
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if [ "$status" -eq 5 ]; then
            echo "No oracle-marked tests collected; skipping oracle lane."
            exit 0
          fi
          exit "$status"

  pages-build:
    name: Build GitHub Pages artifact
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    needs: [quality, rust, test, oracle]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-python: true
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Generate API docs
        run: uv run python tools/generate_api_docs.py
      - name: Disable Jekyll processing
        run: touch docs/api/.nojekyll
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/api

  deploy-pages:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    needs: pages-build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
