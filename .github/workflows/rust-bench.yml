name: Rust benchmark report

on:
  workflow_dispatch:
    inputs:
      jar:
        description: Checked-in JAR fixture to benchmark
        default: "crates/pytecode-engine/fixtures/jars/byte-buddy-1.17.5.jar"
        required: true
        type: string
      iterations:
        description: Benchmark iterations per stage
        default: "3"
        required: true
        type: string

env:
  PYTHON_VERSION: "3.14"
  RUST_TOOLCHAIN: "stable"

jobs:
  benchmark:
    name: Run Rust smoke benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-python: true
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Run benchmark harness
        run: cargo run --release -p pytecode-cli -- bench-smoke --jar "${{ github.event.inputs.jar }}" --iterations "${{ github.event.inputs.iterations }}" > rust-bench-smoke.json
      - name: Compare Rust and Python benchmarks
        run: uv run python tools/compare_rust_python_benchmarks.py --jar "${{ github.event.inputs.jar }}" --iterations "${{ github.event.inputs.iterations }}" --output rust-vs-python-bench.json
      - name: Upload benchmark report
        uses: actions/upload-artifact@v7
        with:
          name: rust-bench-smoke
          path: rust-bench-smoke.json
          if-no-files-found: error
      - name: Upload comparison report
        uses: actions/upload-artifact@v7
        with:
          name: rust-vs-python-bench
          path: rust-vs-python-bench.json
          if-no-files-found: error
