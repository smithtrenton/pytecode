name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v<version> tag to release
        required: true
        type: string

env:
  PYTHON_VERSION: "3.14"
  JAVA_VERSION: "25"

jobs:
  prepare:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      release_ref: ${{ steps.resolve.outputs.release_ref }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - name: Resolve release ref
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          if [ -z "$TAG" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          case "$TAG" in
            v*) ;;
            *)
              echo "Release tag must start with 'v': $TAG" >&2
              exit 1
              ;;
          esac

          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_ref=refs/tags/$TAG" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate release
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-python: true
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Sync dependencies
        run: uv sync --dev
      - name: Build Cython extensions in place
        run: uv run python setup.py build_ext --inplace
      - name: Validate release tag
        run: uv run python tools/validate_release_tag.py --tag "${{ needs.prepare.outputs.release_tag }}"
      - name: Lint
        run: uv run ruff check .
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Type-check
        run: uv run basedpyright
      - name: Run tests
        run: uv run pytest -q
      - name: Validate API docs coverage
        run: uv run python tools/generate_api_docs.py --check

  build:
    name: Build distributions
    needs: [prepare, validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-python: true
      - name: Validate release tag
        run: uv run python tools/validate_release_tag.py --tag "${{ needs.prepare.outputs.release_tag }}"
      - name: Sync dependencies
        run: uv sync --only-dev
      - name: Build Cython extensions in place
        run: uv run python setup.py build_ext --inplace
      - name: Build distributions
        run: uv build
      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/pytecode
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  github-release:
    name: Create GitHub Release
    needs: [prepare, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          if gh release view "$TAG" --repo "$REPO" > /dev/null 2>&1; then
            gh release upload "$TAG" dist/* --repo "$REPO" --clobber
          else
            gh release create "$TAG" dist/* --repo "$REPO" --generate-notes --verify-tag
          fi
