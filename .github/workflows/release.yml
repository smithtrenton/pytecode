name: Release

on:
  push:
    tags:
      - "v*"

env:
  PYTHON_VERSION: "3.14"
  JAVA_VERSION: "25"

jobs:
  validate:
    name: Validate tagged release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-python: true
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Validate release tag
        run: uv run python tools/validate_release_tag.py --tag "${{ github.ref_name }}"
      - name: Lint
        run: uv run ruff check .
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Type-check
        run: uv run basedpyright
      - name: Run tests
        run: uv run pytest -q
      - name: Validate API docs coverage
        run: uv run python tools/generate_api_docs.py --check

  build:
    name: Build distributions
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-python: true
      - name: Validate release tag
        run: uv run python tools/validate_release_tag.py --tag "${{ github.ref_name }}"
      - name: Build distributions
        run: uv build
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/pytecode
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
