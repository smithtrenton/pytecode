name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v<version> tag to release
        required: true
        type: string

env:
  PYTHON_VERSION: "3.14"
  JAVA_VERSION: "25"
  PYTEST_CACHE_VERSION: "v1"
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      release_ref: ${{ steps.resolve.outputs.release_ref }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - name: Resolve release ref
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          if [ -z "$TAG" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          case "$TAG" in
            v*) ;;
            *)
              echo "Release tag must start with 'v': $TAG" >&2
              exit 1
              ;;
          esac

          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_ref=refs/tags/$TAG" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate release
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-python: true
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Cache Pytest data
        uses: actions/cache@v5
        with:
          path: .pytest_cache
          key: pytest-cache-${{ env.PYTEST_CACHE_VERSION }}-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-jdk${{ env.JAVA_VERSION }}-${{ hashFiles('uv.lock', 'tests/helpers.py', 'tests/resources/**/*.java') }}-${{ github.job }}
          restore-keys: |
            pytest-cache-${{ env.PYTEST_CACHE_VERSION }}-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-jdk${{ env.JAVA_VERSION }}-${{ hashFiles('uv.lock', 'tests/helpers.py', 'tests/resources/**/*.java') }}-
            pytest-cache-${{ env.PYTEST_CACHE_VERSION }}-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-jdk${{ env.JAVA_VERSION }}-
      - name: Validate release tag
        run: uv run python tools/validate_release_tag.py --tag "${{ needs.prepare.outputs.release_tag }}"
      - name: Lint
        run: uv run ruff check .
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Check rustfmt
        run: cargo fmt --check
      - name: Run clippy
        run: cargo clippy --all-targets --features extension-module -- -D warnings -A dead_code
      - name: Type-check
        run: uv run basedpyright
      - name: Run tests
        run: uv run pytest -q
      - name: Validate API docs coverage
        run: uv run python tools/generate_api_docs.py --check

  build-sdist:
    name: Build source distribution
    needs: [prepare, validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Validate release tag
        run: uv run python tools/validate_release_tag.py --tag "${{ needs.prepare.outputs.release_tag }}"
      - name: Build source distribution
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build-wheels:
    name: Build wheel (${{ matrix.os }})
    needs: [prepare, validate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            interpreter: python3.14
            manylinux: auto
          - os: macos-latest
            interpreter: python3.14
            manylinux: auto
          - os: windows-latest
            interpreter: python
            manylinux: auto
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Validate release tag
        run: uv run python tools/validate_release_tag.py --tag "${{ needs.prepare.outputs.release_tag }}"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --compatibility pypi -i ${{ matrix.interpreter }}
      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: python-package-wheel-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/pytecode
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          pattern: python-package-*
          merge-multiple: true
          path: dist/
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  github-release:
    name: Create GitHub Release
    needs: [prepare, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          pattern: python-package-*
          merge-multiple: true
          path: dist/
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          if gh release view "$TAG" --repo "$REPO" > /dev/null 2>&1; then
            gh release upload "$TAG" dist/* --repo "$REPO" --clobber
          else
            gh release create "$TAG" dist/* --repo "$REPO" --generate-notes --verify-tag
          fi
